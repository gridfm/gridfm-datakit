name: CI Build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pre-commit-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pre-commit
        run: pre-commit run --verbose --all-files

  security-test:
    runs-on: ubuntu-latest
    container: python:3.12-slim
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"

      - name: Security Checks
        run: bandit --severity-level high .

  pytests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Julia 1.12
        uses: julia-actions/setup-julia@v1
        with:
          version: '1.12'

      # Cache the whole Julia depot (downloaded packages, artifacts and, most
      # importantly, the precompile cache). Keyed on the pinned solver versions
      # so it only rebuilds when juliapkg.json changes.
      - name: Cache Julia depot
        uses: actions/cache@v4
        with:
          path: ~/.julia
          key: julia-depot-${{ runner.os }}-julia1.12-${{ hashFiles('gridfm_datakit/juliapkg.json') }}
          restore-keys: |
            julia-depot-${{ runner.os }}-julia1.12-

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Create virtualenv
        run: |
          python -m venv .venv
          source .venv/bin/activate

      - name: Install Python dependencies
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip wheel
          pip install -e ".[test]"

      # Resolve and precompile the pinned Julia packages from juliapkg.json.
      # On a cache hit this is near-instant; on a miss it populates the depot
      # cache for subsequent runs.
      - name: Set up Julia packages (PowerModels)
        run: |
          source .venv/bin/activate
          python -c "import juliacall"

      - name: Unit tests
        run: |
          source .venv/bin/activate
          export SKIP_LARGE_GRIDS=1
          pytest --cov=. tests/ -v -s

  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
